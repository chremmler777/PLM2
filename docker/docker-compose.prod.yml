# Production deployment: nginx-served frontend, gunicorn-free uvicorn backend
# (no reload, DEBUG off), PostgreSQL and Redis kept internal.
#
#   cp .env.example .env   # then set SECRET_KEY and POSTGRES_PASSWORD
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    container_name: plm-db
    environment:
      POSTGRES_USER: plm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: plm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plm"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - data

  redis:
    image: redis:7-alpine
    container_name: plm-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-plm} --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: plm-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://plm:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/plm
      REDIS_URL: redis://:${REDIS_PASSWORD:-plm}@redis:6379/0
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost"]}
      UPLOAD_DIR: /app/storage/uploads
      GLTF_DIR: /app/storage/gltf
    volumes:
      - upload_data:/app/storage/uploads
      - gltf_data:/app/storage/gltf
      - upload_workdir:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - backend
      - data

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    container_name: plm-frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  upload_data:
  gltf_data:
  upload_workdir:

networks:
  backend:
    driver: bridge
  data:
    driver: bridge
